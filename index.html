<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Sort Visualizer - Academy</title>
    <style>
        :root {
            --bg: #0b0f1a;
            --surface: #161d2f;
            --border: #2d3a59;
            --primary: #38bdf8;   /* Màu chia mảng */
            --warning: #fbbf24;   /* Màu so sánh */
            --success: #22c55e;   /* Màu hoàn thành */
            --accent: #f472b6;    /* Màu mảng hiện tại đang xét */
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Thanh điều khiển */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .controls {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: flex-end;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        input, button {
            background: var(--bg);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        button {
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            min-width: 100px;
        }

        button:hover:not(:disabled) { border-color: var(--primary); background: #1e293b; transform: translateY(-1px); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-play { background: var(--primary); color: #000; border: none; }
        .btn-play:hover:not(:disabled) { background: #7dd3fc; }

        /* Vùng hiển thị cây */
        #visual-area {
            flex-grow: 1;
            padding: 40px 20px 150px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
        }

        .level {
            display: flex;
            justify-content: center;
            gap: 40px;
            width: 100%;
            position: relative;
        }

        .node {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            animation: slideUp 0.5s ease-out;
        }

        .node-label {
            font-size: 10px;
            color: var(--text-dim);
            margin-bottom: 5px;
            font-weight: bold;
        }

        .array-box {
            display: flex;
            gap: 4px;
            padding: 8px;
            background: rgba(255,255,255,0.02);
            border: 2px solid var(--border);
            border-radius: 12px;
            transition: all 0.3s;
        }

        .cell {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }

        /* Highlight trạng thái */
        .node.active .array-box { border-color: var(--primary); background: rgba(56, 189, 248, 0.05); }
        .cell.comparing { background: var(--warning); color: #000; transform: scale(1.1); z-index: 10; border-color: #fff; }
        .cell.sorted { background: var(--success); color: #000; border-color: transparent; }
        .cell.splitting { color: var(--primary); border-color: var(--primary); }

        /* Chú thích phía dưới */
        .explanation-card {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 650px;
            background: rgba(22, 29, 47, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--primary);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 200;
        }

        .step-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .step-num { color: var(--primary); font-weight: 800; font-size: 12px; }
        .step-text { font-size: 15px; line-height: 1.6; min-height: 45px; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Thanh trượt tốc độ custom */
        input[type=range] { height: 6px; -webkit-appearance: none; background: var(--border); border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--primary); cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="controls">
        <div class="input-group">
            <label>Dữ liệu mảng</label>
            <input type="text" id="arr-input" value="38, 27, 43, 3, 9, 82, 10">
        </div>
        <div class="input-group">
            <label>Tốc độ (ms)</label>
            <input type="range" id="speed-range" min="100" max="2000" value="800" dir="rtl">
        </div>
        <div class="input-group" style="flex-direction: row; gap: 8px;">
            <button id="btn-reset">Reset</button>
            <button id="btn-prev">Bước trước</button>
            <button id="btn-next">Kế tiếp</button>
            <button id="btn-play" class="btn-play">Tự động chạy</button>
        </div>
    </div>
</div>

<div id="visual-area"></div>

<div class="explanation-card">
    <div class="step-header">
        <span class="step-num" id="step-label">BƯỚC 0 / 0</span>
        <span id="action-type" style="font-size: 11px; color: var(--text-dim); text-transform: uppercase;">Khởi tạo</span>
    </div>
    <div class="step-text" id="step-desc">Nhấn "Kế tiếp" hoặc "Tự động chạy" để bắt đầu quan sát thuật toán Merge Sort.</div>
</div>

<script>
    let states = [];
    let currentStep = 0;
    let autoPlayTimer = null;

    const visualArea = document.getElementById('visual-area');
    const stepDesc = document.getElementById('step-desc');
    const stepLabel = document.getElementById('step-label');
    const actionType = document.getElementById('action-type');

    // 1. KHỞI TẠO & CHUẨN BỊ SNAPSHOTS
    function init() {
        const val = document.getElementById('arr-input').value;
        const arr = val.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        
        states = [];
        currentStep = 0;

        const rootNode = {
            id: 'root',
            values: [...arr],
            level: 0,
            children: [],
            status: 'normal', // normal, splitting, comparing, merged
            comparingIndices: []
        };

        record(rootNode, "Bắt đầu với mảng gốc. Thuật toán Merge Sort sẽ chia mảng này theo nguyên lý 'Chia để trị'.", "Khởi tạo");
        
        // Chạy thuật toán và ghi lại từng bước thay đổi nhỏ nhất
        mergeSortRecursive(rootNode);
        
        render(0);
    }

    function record(tree, desc, type) {
        states.push({
            tree: JSON.parse(JSON.stringify(tree)),
            desc: desc,
            type: type
        });
    }

    function mergeSortRecursive(node) {
        if (node.values.length <= 1) {
            record(getGlobalTree(), `Mảng con [${node.values}] chỉ còn 1 phần tử. Không thể chia thêm, bắt đầu quay lại bước gộp.`, "Điều kiện dừng");
            return node.values;
        }

        const mid = Math.floor(node.values.length / 2);
        const leftArr = node.values.slice(0, mid);
        const rightArr = node.values.slice(mid);

        const leftChild = { id: node.id + 'L', values: leftArr, level: node.level + 1, children: [], status: 'normal' };
        const rightChild = { id: node.id + 'R', values: rightArr, level: node.level + 1, children: [], status: 'normal' };
        
        node.children = [leftChild, rightChild];
        node.status = 'splitting';
        
        updateGlobalTree(node.id, n => { 
            n.children = [leftChild, rightChild]; 
            n.status = 'splitting';
        });
        record(getGlobalTree(), `Chia mảng [${node.values.join(', ')}] thành hai mảng con: [${leftArr.join(', ')}] và [${rightArr.join(', ')}].`, "Chia mảng");

        const sortedLeft = mergeSortRecursive(leftChild);
        const sortedRight = mergeSortRecursive(rightChild);

        return merge(node, sortedLeft, sortedRight);
    }

    function merge(node, left, right) {
        let result = [];
        let i = 0, j = 0;

        updateGlobalTree(node.id, n => { n.status = 'comparing'; n.values = []; });
        record(getGlobalTree(), `Bắt đầu gộp (Merge) hai mảng con đã sắp xếp vào nút cha.`, "Gộp mảng");

        while (i < left.length && j < right.length) {
            const pickLeft = left[i] <= right[j];
            const msg = `So sánh ${left[i]} và ${right[j]}. ${pickLeft ? left[i] + ' nhỏ hơn (hoặc bằng)' : right[j] + ' nhỏ hơn'}, đưa vào mảng kết quả.`;
            
            updateGlobalTree(node.id, n => { 
                n.status = 'comparing';
                n.comparingIndices = [i, j]; 
            });
            record(getGlobalTree(), msg, "So sánh");

            if (pickLeft) result.push(left[i++]);
            else result.push(right[j++]);
            
            const currentRes = [...result];
            updateGlobalTree(node.id, n => { n.values = currentRes; });
        }

        if (i < left.length || j < right.length) {
            const remaining = i < left.length ? left.slice(i) : right.slice(j);
            result = [...result, ...remaining];
            updateGlobalTree(node.id, n => { n.values = result; });
            record(getGlobalTree(), `Đưa các phần tử còn lại [${remaining.join(', ')}] vào mảng.`, "Gộp phần còn lại");
        }

        updateGlobalTree(node.id, n => { n.status = 'merged'; });
        record(getGlobalTree(), `Hoàn tất gộp tại nút này. Kết quả tạm thời: [${result.join(', ')}].`, "Hoàn tất nút");

        return result;
    }

    // Helper functions cho tree management
    function getGlobalTree() { return states[states.length - 1].tree; }
    
    function updateGlobalTree(id, callback) {
        const root = getGlobalTree();
        function find(n) {
            if (n.id === id) { callback(n); return true; }
            for (let c of n.children) if (find(c)) return true;
            return false;
        }
        find(root);
    }

    // 2. RENDER GIAO DIỆN
    function render(index) {
        if (index < 0 || index >= states.length) return;
        currentStep = index;
        const state = states[index];

        visualArea.innerHTML = '';
        stepDesc.innerText = state.desc;
        stepLabel.innerText = `BƯỚC ${currentStep + 1} / ${states.length}`;
        actionType.innerText = state.type;

        // Phân cấp để vẽ
        const levels = {};
        function traverse(n) {
            if (!levels[n.level]) levels[n.level] = [];
            levels[n.level].push(n);
            n.children.forEach(traverse);
        }
        traverse(state.tree);

        Object.keys(levels).forEach(l => {
            const levelDiv = document.createElement('div');
            levelDiv.className = 'level';
            
            levels[l].forEach(node => {
                const nodeDiv = document.createElement('div');
                nodeDiv.className = 'node ' + (node.status !== 'normal' ? 'active' : '');
                
                const label = document.createElement('div');
                label.className = 'node-label';
                label.innerText = node.id === 'root' ? 'GỐC' : (node.id.endsWith('L') ? 'TRÁI' : 'PHẢI');

                const box = document.createElement('div');
                box.className = 'array-box';
                
                node.values.forEach((v, idx) => {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = v;
                    if (node.status === 'merged') cell.classList.add('sorted');
                    if (node.status === 'splitting') cell.classList.add('splitting');
                    if (node.status === 'comparing') cell.classList.add('comparing');
                    box.appendChild(cell);
                });

                nodeDiv.appendChild(label);
                nodeDiv.appendChild(box);
                levelDiv.appendChild(nodeDiv);
            });
            visualArea.appendChild(levelDiv);
        });

        // Cập nhật nút bấm
        document.getElementById('btn-prev').disabled = currentStep === 0;
        document.getElementById('btn-next').disabled = currentStep === states.length - 1;
    }

    // 3. ĐIỀU KHIỂN
    document.getElementById('btn-next').onclick = () => { stopAuto(); render(currentStep + 1); };
    document.getElementById('btn-prev').onclick = () => { stopAuto(); render(currentStep - 1); };
    document.getElementById('btn-reset').onclick = () => { stopAuto(); init(); };

    document.getElementById('btn-play').onclick = function() {
        if (autoPlayTimer) {
            stopAuto();
        } else {
            this.innerText = "Dừng lại";
            this.style.background = "#ef4444";
            autoPlay();
        }
    };

    function autoPlay() {
        if (currentStep < states.length - 1) {
            render(currentStep + 1);
            autoPlayTimer = setTimeout(autoPlay, document.getElementById('speed-range').value);
        } else {
            stopAuto();
        }
    }

    function stopAuto() {
        clearTimeout(autoPlayTimer);
        autoPlayTimer = null;
        const btn = document.getElementById('btn-play');
        btn.innerText = "Tự động chạy";
        btn.style.background = "var(--primary)";
    }

    // Khởi tạo lần đầu
    init();

</script>
</body>
</html>
